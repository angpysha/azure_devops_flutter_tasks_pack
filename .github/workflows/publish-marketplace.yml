name: Publish to Azure Marketplace

# Required GitHub repository secret:
#   AZURE_DEVOPS_EXT_PAT
#
# The PAT must belong to a Microsoft account that is Owner or Contributor on the
# Marketplace publisher "AndriiPetrovskyi":
#   https://marketplace.visualstudio.com/manage/publishers/AndriiPetrovskyi/hub
#
# Create the PAT at https://dev.azure.com/_usersSettings/tokens with:
#   - Organizations: All accessible organizations  (NOT a single org)
#   - Scopes: Marketplace (Manage)  (Manage, not only Publish)
#
# Use the same account as your Azure DevOps MarketPlaceServiceConnection if
# publishing from Azure Pipelines already works.
#
# 403 "Make changes to, share, or view certificate of an existing extension"
# means the PAT account is not a member of publisher AndriiPetrovskyi.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-marketplace
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: npm install

      - name: Install TypeScript compiler
        run: npm install -g typescript

      - name: Install task dependencies
        run: npm run install_packages

      - name: Compile TypeScript tasks
        run: npm run compile_tasks

      - name: Install TFX CLI
        run: npm install -g tfx-cli

      - name: Package VSIX
        run: |
          tfx extension create --manifest-globs ./vss-extension.json
          mkdir -p vsix_output
          mv ./*.vsix vsix_output/
          ls -la vsix_output/

      - name: Verify Marketplace publish access
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
        run: |
          if [ -z "$AZURE_DEVOPS_EXT_PAT" ]; then
            echo "Missing secret AZURE_DEVOPS_EXT_PAT."
            exit 1
          fi

          tfx extension show \
            --publisher AndriiPetrovskyi \
            --extension-id flutter-build-help-tools \
            --auth-type pat \
            --token "$AZURE_DEVOPS_EXT_PAT"

      - name: Publish to Visual Studio Marketplace
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
        run: |
          VSIX_FILE="$(find vsix_output -maxdepth 1 -name '*.vsix' -print -quit)"
          if [ -z "$VSIX_FILE" ]; then
            echo "No VSIX file found in vsix_output"
            exit 1
          fi

          tfx extension publish \
            --publisher AndriiPetrovskyi \
            --vsix "$VSIX_FILE" \
            --auth-type pat \
            --token "$AZURE_DEVOPS_EXT_PAT"
